<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <link rel="stylesheet" th:href="@{/css/loginstyle.css}">
</head>
<body>

<div class="login-container">

    <h1>ログイン</h1>

    <p class="message"
       th:if="${message}"
       th:text="${message}">
    </p>

    <form action="/login" method="post">

        <div class="form-group">
            <label for="username">ユーザー名</label>
            <input
                type="text"
                id="username"
                name="username">
        </div>

        <div class="form-group">
            <label for="password">パスワード</label>
            <input
                type="password"
                id="password"
                name="password">
        </div>

        <button type="submit">
            ログイン
        </button>

    </form>

</div>

</body>
</html>
